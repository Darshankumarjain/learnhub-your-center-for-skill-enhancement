services:
  - type: web
    name: learnhub-backend
    runtime: node
    rootDir: Project Files/Backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGO_DB
        sync: false
      - key: JWT_KEY
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads

  - type: web
    name: learnhub-frontend
    runtime: static
    rootDir: Project Files/Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
